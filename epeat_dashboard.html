<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<title>EPEAT Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Microsoft JhengHei", Arial, sans-serif;
    background: #f0f4f8; color: #2d3748; min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a365d 0%, #2b6cb0 100%);
    color: white; padding: 24px 32px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .header h1 { font-size: 1.8rem; font-weight: 700; letter-spacing: 0.5px; }
  .header p { margin-top: 4px; opacity: 0.85; font-size: 0.92rem; }
  .main { padding: 24px 32px; }
  .filter-panel {
    background: white; border-radius: 12px; padding: 20px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 20px;
  }
  .filter-panel h2 {
    font-size: 1rem; font-weight: 600; color: #4a5568;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .filter-row { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
  .filter-col { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 160px; }
  .filter-col > label {
    font-size: 0.82rem; font-weight: 600; color: #718096;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .search-col { flex: 2; min-width: 220px; position: relative; }
  .search-col input {
    width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px;
    padding: 9px 14px 9px 38px; font-size: 0.93rem;
    background: #f7fafc; color: #2d3748; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-col input:focus {
    border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.2); background: white;
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: #a0aec0; font-size: 1rem; pointer-events: none;
  }
  /* ── 多選下拉（跟 NPI search 一樣的模式）── */
  .ms-wrap { position: relative; display: inline-block; width: 100%; }
  .ms-btn {
    width: 100%; padding: 9px 32px 9px 14px;
    border: 1.5px solid #e2e8f0; border-radius: 8px;
    background: #f7fafc; color: #2d3748; font-size: 0.93rem;
    cursor: pointer; text-align: left; user-select: none;
    transition: border-color 0.2s, box-shadow 0.2s; min-height: 38px;
    display: flex; align-items: center;
  }
  .ms-btn::after {
    content: '\25BC'; position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%); font-size: 10px; color: #a0aec0;
  }
  .ms-btn:hover, .ms-btn.open {
    border-color: #4299e1; box-shadow: 0 0 0 3px rgba(66,153,225,0.2); background: white;
  }
  .ms-dd {
    display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: white; border: 1.5px solid #e2e8f0; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 100;
    max-height: 240px; overflow-y: auto; padding: 4px 0;
  }
  .ms-dd.show { display: block; }
  .ms-dd .ms-all {
    padding: 8px 14px; font-size: 0.85rem; color: #2b6cb0;
    cursor: pointer; border-bottom: 1px solid #e2e8f0; font-weight: 600;
    position: sticky; top: 0; background: white; z-index: 1;
  }
  .ms-dd .ms-all:hover { background: #ebf8ff; }
  .ms-dd label {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; cursor: pointer; font-size: 0.88rem; color: #2d3748;
  }
  .ms-dd label:hover { background: #ebf8ff; }
  .ms-dd input[type="checkbox"] {
    width: 16px; height: 16px; accent-color: #2b6cb0; cursor: pointer; flex-shrink: 0;
  }

  .btn-reset {
    background: #e53e3e; color: white; border: none; border-radius: 8px;
    padding: 9px 20px; font-size: 0.93rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s; white-space: nowrap; align-self: flex-end;
  }
  .btn-reset:hover { background: #c53030; transform: translateY(-1px); }
  .btn-export {
    background: #2b6cb0; color: white; border: none; border-radius: 8px;
    padding: 9px 20px; font-size: 0.93rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s, transform 0.1s; white-space: nowrap; align-self: flex-end;
  }
  .btn-export:hover { background: #2c5282; transform: translateY(-1px); }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card {
    background: white; border-radius: 10px; padding: 14px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 1; min-width: 130px;
    text-align: center; border-top: 4px solid #4299e1;
  }
  .stat-card.gold { border-top-color: #d69e2e; }
  .stat-card.silver { border-top-color: #718096; }
  .stat-card.ok { border-top-color: #38a169; }
  .stat-card.ongoing { border-top-color: #ed8936; }
  .stat-num { font-size: 2rem; font-weight: 700; color: #2d3748; line-height: 1; }
  .stat-label { font-size: 0.8rem; color: #718096; margin-top: 4px; font-weight: 500; }

  .result-panel {
    background: white; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07); overflow: hidden;
  }
  .result-header {
    padding: 14px 20px; border-bottom: 1px solid #e2e8f0;
    display: flex; justify-content: space-between; align-items: center; background: #f7fafc;
  }
  .result-count { font-size: 0.92rem; color: #4a5568; font-weight: 500; }
  .result-count span { font-weight: 700; color: #2b6cb0; font-size: 1.05rem; }
  .no-result { text-align: center; padding: 60px 20px; color: #a0aec0; font-size: 1rem; }
  .table-wrapper { overflow-x: auto; max-height: 560px; overflow-y: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead th {
    background: #2b6cb0; color: white; padding: 11px 14px; text-align: left;
    font-weight: 600; white-space: nowrap; position: sticky; top: 0; z-index: 10;
    user-select: none; cursor: pointer;
  }
  thead th:hover { background: #2c5282; }
  thead th .sort-arrow { margin-left: 4px; opacity: 0.6; font-size: 0.75rem; }
  tbody tr { transition: background 0.15s; border-bottom: 1px solid #edf2f7; }
  tbody tr:hover { background: #ebf8ff; }
  tbody tr:nth-child(even) { background: #f7fafc; }
  tbody tr:nth-child(even):hover { background: #ebf8ff; }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: 0.78rem; font-weight: 600; white-space: nowrap;
  }
  .badge-gold { background: #fef3c7; color: #92400e; border: 1px solid #f6d860; }
  .badge-silver { background: #e2e8f0; color: #4a5568; border: 1px solid #cbd5e0; }
  .badge-na { background: #fed7d7; color: #742a2a; border: 1px solid #fc8181; }
  .badge-ok { background: #c6f6d5; color: #22543d; border: 1px solid #9ae6b4; }
  .badge-ongoing { background: #feebc8; color: #7b341e; border: 1px solid #fbd38d; }
  .highlight { background: #fff3cd; border-radius: 3px; padding: 1px 2px; }
  /* ── 分組折疊 ── */
  .group-header td {
    background: #edf2f7; font-weight: 700; font-size: 0.92rem; color: #2d3748;
    padding: 8px 12px; border-bottom: 2px solid #cbd5e0;
  }
  .group-header td .group-toggle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 4px; border: 1.5px solid #a0aec0;
    background: white; color: #4a5568; font-size: 1rem; font-weight: 700;
    cursor: pointer; margin-right: 8px; line-height: 1; transition: all 0.15s;
    user-select: none; vertical-align: middle;
  }
  .group-header td .group-toggle:hover { background: #dbeafe; border-color: #4299e1; }
  .group-header td .group-count {
    font-weight: 400; font-size: 0.82rem; color: #718096; margin-left: 6px;
  }
  .collapsed-row { display: none; }
  .pagination {
    display: flex; justify-content: center; align-items: center;
    gap: 6px; padding: 14px; border-top: 1px solid #e2e8f0; flex-wrap: wrap;
  }
  .page-btn {
    background: white; border: 1.5px solid #e2e8f0; border-radius: 6px;
    padding: 6px 12px; font-size: 0.88rem; cursor: pointer; color: #4a5568;
    transition: all 0.15s; min-width: 36px; text-align: center;
  }
  .page-btn:hover { background: #ebf8ff; border-color: #4299e1; color: #2b6cb0; }
  .page-btn.active { background: #2b6cb0; color: white; border-color: #2b6cb0; font-weight: 700; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-info { color: #718096; font-size: 0.88rem; }

  /* ── ES9 彈窗 ── */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: white; border-radius: 12px; width: 90%; max-width: 900px;
    max-height: 80vh; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
    display: flex; justify-content: space-between; align-items: center;
    background: #f7fafc;
  }
  .modal-header h3 { font-size: 1.1rem; color: #2d3748; }
  .modal-close {
    background: none; border: none; font-size: 1.5rem; color: #a0aec0;
    cursor: pointer; line-height: 1; padding: 0; width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center; border-radius: 6px;
  }
  .modal-close:hover { background: #edf2f7; color: #2d3748; }
  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .modal-body table { font-size: 0.85rem; }
  .modal-body thead th {
    background: #4a5568; padding: 8px 10px; font-size: 0.82rem;
    position: sticky; top: 0;
  }
  .modal-body tbody td { padding: 7px 10px; }
  .btn-es9 {
    background: #38a169; color: white; border: none; border-radius: 6px;
    padding: 4px 10px; font-size: 0.78rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-es9:hover { background: #2f855a; }
  .btn-es9:disabled {
    background: #a0aec0; cursor: not-allowed;
  }

  @media (max-width: 768px) {
    .main { padding: 16px; }
    .header { padding: 16px; }
    .stats-bar { gap: 10px; }
    .stat-card { min-width: 100px; padding: 10px 12px; }
    .stat-num { font-size: 1.5rem; }
    .modal-box { width: 95%; max-height: 90vh; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>EPEAT Dashboard</h1>
  <p>互動式產品認證查詢系統 &nbsp;|&nbsp; 513 筆記錄</p>
</div>

<div class="main">
  <div class="filter-panel">
    <h2>搜尋與篩選</h2>
    <div class="filter-row">
      <div class="filter-col search-col">
        <label>搜尋（型號或市場名稱）</label>
        <span class="search-icon">&#128270;</span>
        <input type="text" id="searchInput" placeholder="輸入關鍵字...（可選）" oninput="onSearchChange()">
      </div>
      <div class="filter-col">
        <label>EPEAT 規格</label>
        <div class="ms-wrap">
          <div class="ms-btn" id="specBtn" onclick="toggleMs('spec')">全部</div>
          <div class="ms-dd" id="specDd"></div>
        </div>
      </div>
      <div class="filter-col">
        <label>狀態</label>
        <div class="ms-wrap">
          <div class="ms-btn" id="statusBtn" onclick="toggleMs('status')">全部</div>
          <div class="ms-dd" id="statusDd"></div>
        </div>
      </div>
      <div class="filter-col">
        <label>年份</label>
        <div class="ms-wrap">
          <div class="ms-btn" id="yearBtn" onclick="toggleMs('year')">全部</div>
          <div class="ms-dd" id="yearDd"></div>
        </div>
      </div>
      <button class="btn-reset" onclick="resetFilters()">重設</button>
      <button class="btn-export" onclick="exportExcel()">匯出 Excel</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="numTotal">0</div>
      <div class="stat-label">符合筆數</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-num" id="numGold">0</div>
      <div class="stat-label">Gold</div>
    </div>
    <div class="stat-card silver">
      <div class="stat-num" id="numSilver">0</div>
      <div class="stat-label">Silver</div>
    </div>
    <div class="stat-card ok">
      <div class="stat-num" id="numOk">0</div>
      <div class="stat-label">狀態：ok</div>
    </div>
    <div class="stat-card ongoing">
      <div class="stat-num" id="numOngoing">0</div>
      <div class="stat-label">狀態：on-going</div>
    </div>
  </div>

  <div class="result-panel">
    <div class="result-header">
      <div class="result-count">顯示 <span id="resultCount">0</span> 筆結果</div>
      <div style="font-size:0.82rem;color:#718096;">點擊欄位標題可排序</div>
    </div>
    <div id="noResult" class="no-result" style="display:none;">
      找不到符合條件的記錄，請嘗試調整篩選條件。
    </div>
    <div class="table-wrapper" id="tableWrapper">
      <table>
        <thead><tr id="tableHeader"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- ES9 彈窗 -->
<div class="modal-overlay" id="es9Modal" onclick="closeEs9Modal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="es9ModalTitle">ES9.0 PASS SKU 詳細資訊</h3>
      <button class="modal-close" onclick="closeEs9Modal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="table-wrapper">
        <table>
          <thead><tr id="es9ModalHeader"></tr></thead>
          <tbody id="es9ModalBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

// 按市場名稱第二個空格前的內容分組，如 "Prestige 16 AI Studio A13MG" -> "Prestige 16"
function getGroupKey(mktName){
  if(!mktName) return "(空白)";
  const idx=mktName.indexOf(' ');
  if(idx===-1) return mktName;
  const idx2=mktName.indexOf(' ',idx+1);
  return idx2===-1 ? mktName : mktName.substring(0,idx2);
}
// 取證日期排序鍵：實際取證日期優先，沒有則用預計取證日期
function getSortDate(r){
  return r["实际取证日期"]||r["预计取证日期"]||"9999-99-99";
}

// ── 展開/折疊狀態 ──
const expandedGroups=new Set();
function toggleGroup(key){
  if(expandedGroups.has(key)) expandedGroups.delete(key);
  else expandedGroups.add(key);
  render();
}

// ── 取得資料中的唯一值 ──
function getUniqueSpecs(){
  let vals=[...new Set(RAW_DATA.map(r=>r["EPEAT spec"]||""))].sort();
  // 將空值顯示為 (空白)，但仍保留空字串作為 value 以便篩選匹配
  return vals.map(v=>v?v:"(空白)");
}
function getUniqueStatuses(){
  return [...new Set(RAW_DATA.map(r=>r["status"]||""))].filter(Boolean).sort();
}
function getUniqueYears(){
  return [...new Set(RAW_DATA.map(r=>r["年份"]||""))].filter(Boolean).sort();
}

// ── 動態建立下拉選單（跟 NPI search 的 buildMsDropdown 一樣）──
function buildMsDropdown(id){
  let dd, items, prefix;
  if(id==='spec'){dd=document.getElementById('specDd');items=getUniqueSpecs();prefix='spec';}
  else if(id==='status'){dd=document.getElementById('statusDd');items=getUniqueStatuses();prefix='status';}
  else if(id==='year'){dd=document.getElementById('yearDd');items=getUniqueYears();prefix='year';}

  let h='<div class="ms-all" onclick="msToggleAll(\''+id+'\')">(Select All / None)</div>';
  items.forEach(v=>{
    h+='<label><input type="checkbox" value="'+escAttr(v)+'" onchange="msChange(\''+id+'\')"> '+escHtml(v)+'</label>';
  });
  dd.innerHTML=h;
}

// ── 下拉開關（跟 NPI search 的 toggleMs 一樣）──
function toggleMs(id){
  let dd;
  if(id==='spec') dd=document.getElementById('specDd');
  else if(id==='status') dd=document.getElementById('statusDd');
  else if(id==='year') dd=document.getElementById('yearDd');

  document.querySelectorAll('.ms-dd.show').forEach(d=>{if(d!==dd)d.classList.remove('show');});
  dd.classList.toggle('show');
}
// 點擊外部關閉（跟 NPI search 一樣用 .ms-wrap 判斷）
document.addEventListener('click',function(e){
  if(!e.target.closest('.ms-wrap')) document.querySelectorAll('.ms-dd.show').forEach(d=>d.classList.remove('show'));
});

// ── 全選/取消全選 ──
function msToggleAll(id){
  let dd;
  if(id==='spec') dd=document.getElementById('specDd');
  else if(id==='status') dd=document.getElementById('statusDd');
  else if(id==='year') dd=document.getElementById('yearDd');

  const cbs=dd.querySelectorAll('input[type=checkbox]');
  const allChecked=[...cbs].every(c=>c.checked);
  cbs.forEach(c=>c.checked=!allChecked);
  msChange(id);
}

// ── checkbox 變更後：從 DOM 讀取狀態 + 更新按鈕文字 + 觸發篩選（跟 NPI search 的 msChange 一樣）──
function msChange(id){
  let dd, btn, label;
  if(id==='spec'){dd=document.getElementById('specDd');btn=document.getElementById('specBtn');label='EPEAT 規格';}
  else if(id==='status'){dd=document.getElementById('statusDd');btn=document.getElementById('statusBtn');label='狀態';}
  else if(id==='year'){dd=document.getElementById('yearDd');btn=document.getElementById('yearBtn');label='年份';}

  const cbs=dd.querySelectorAll('input[type=checkbox]');
  const checked=[...cbs].filter(c=>c.checked);
  if(checked.length===0){
    btn.textContent='全部';
  } else if(checked.length===cbs.length){
    btn.textContent='全部';
  } else {
    btn.textContent=checked.length+' selected';
  }
  applyFilters();
}

// ── 取得多選值（從 DOM 讀取，跟 NPI 一樣）──
function getMsValues(id){
  let dd;
  if(id==='spec') dd=document.getElementById('specDd');
  else if(id==='status') dd=document.getElementById('statusDd');
  else if(id==='year') dd=document.getElementById('yearDd');
  const cbs=dd.querySelectorAll('input[type=checkbox]:checked');
  return [...cbs].map(c=>c.value);
}

// ── 搜尋 ──
function onSearchChange(){
  applyFilters();
}

// ── 篩選 + 排序 + 分組 ──
function applyFilters(){
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  const specs=getMsValues('spec');
  const statuses=getMsValues('status');
  const years=getMsValues('year');

  filteredData=RAW_DATA.filter(r=>{
    const mn=(r["Model Name"]||"").toLowerCase();
    const mk=(r["MKT Name"]||"").toLowerCase();
    const matchSearch=!q||mn.includes(q)||mk.includes(q);
    const specVal=r["EPEAT spec"]||"";
    const matchSpec=specs.length===0||specs.some(s=>(s==="(空白)"&&specVal==="")||s===specVal);
    const matchStatus=statuses.length===0||statuses.includes(r["status"]);
    const matchYear=years.length===0||years.includes(r["年份"]);
    return matchSearch&&matchSpec&&matchStatus&&matchYear;
  });

  // 分組排序：先按組名排序，組內按取證日期升序
  filteredData.sort((a,b)=>{
    const ga=getGroupKey(a["MKT Name"]||"");
    const gb=getGroupKey(b["MKT Name"]||"");
    const cmp=ga.localeCompare(gb);
    if(cmp!==0) return cmp;
    // 組內：用戶點擊表頭排序時優先，否則按取證日期升序
    if(sortCol){
      const va=a[sortCol]||"";
      const vb=b[sortCol]||"";
      return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    }
    return getSortDate(a).localeCompare(getSortDate(b));
  });

  currentPage=1;
  updateStats();
  render();
}

// ── 統計 ──
function updateStats(){
  const d=filteredData;
  document.getElementById("numTotal").textContent=d.length;
  document.getElementById("numGold").textContent=d.filter(r=>r["EPEAT spec"]==="v1.0 Gold").length;
  document.getElementById("numSilver").textContent=d.filter(r=>r["EPEAT spec"]==="v1.0 Silver").length;
  document.getElementById("numOk").textContent=d.filter(r=>r["status"]==="ok").length;
  document.getElementById("numOngoing").textContent=d.filter(r=>r["status"]==="on-going").length;
  document.getElementById("resultCount").textContent=d.length;
}

// ── 排序 ──
function sortBy(col){
  if(sortCol===col){sortAsc=!sortAsc;}else{sortCol=col;sortAsc=true;}
  document.querySelectorAll(".sort-arrow").forEach(el=>el.innerHTML="&#8645;");
  const key=col.replace(/[^a-zA-Z0-9]/g,"_");
  const arrow=document.getElementById("sort_"+key);
  if(arrow) arrow.innerHTML=sortAsc?"&#8593;":"&#8595;";
  applyFilters();
}

// ── 表頭 ──
const headerRow=document.getElementById("tableHeader");
COLUMNS.forEach(col=>{
  const th=document.createElement("th");
  const safeKey=col.key.replace(/[^a-zA-Z0-9]/g,"_");
  th.innerHTML=col.label+"<span class=\"sort-arrow\" id=\"sort_"+safeKey+"\">&#8645;</span>";
  th.onclick=()=>sortBy(col.key);
  headerRow.appendChild(th);
});

// ── 渲染列表 ──
function highlight(text,query){
  if(!query||!text) return escHtml(text||"");
  const escaped=escHtml(text);
  const escapedQ=query.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
  try{return escaped.replace(new RegExp(escapedQ,"gi"),m=>"<span class=\"highlight\">"+m+"</span>");}
  catch(e){return escaped;}
}

function render(){
  const q=document.getElementById("searchInput").value.trim().toLowerCase();
  const tbody=document.getElementById("tableBody");
  const noResult=document.getElementById("noResult");
  const tableWrapper=document.getElementById("tableWrapper");

  if(filteredData.length===0){
    noResult.style.display="";tableWrapper.style.display="none";
    document.getElementById("pagination").innerHTML="";return;
  }
  noResult.style.display="none";tableWrapper.style.display="";

  // 先把分頁前的資料按分組切開，計算分頁需要的總行數（含分組標題行）
  // 策略：先計算每頁能放多少資料行，分組標題行不佔資料行數但佔顯示空間
  // 簡化處理：直接分頁資料行，渲染時插入分組標題
  const totalPages=Math.ceil(filteredData.length/PAGE_SIZE);
  const start=(currentPage-1)*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE,filteredData.length);
  const pageData=filteredData.slice(start,end);

  // 為分頁資料建立分組索引
  let prevGroup="";
  let lastGroupKey="";
  let groupStartIdx=-1; // 在 filteredData 中的起始索引
  // 確定本頁第一筆所屬組的起始位置（可能在前一頁）
  if(start>0){
    lastGroupKey=getGroupKey(filteredData[start-1]["MKT Name"]||"");
  }
  // 如果本頁第一筆跟前一頁最後一筆同組，且前一頁那組未展開，則本頁第一筆需要顯示為組內延續
  let pageFirstGroupKey=getGroupKey(pageData[0]["MKT Name"]||"");

  tbody.innerHTML="";
  let currentGroupKey="";
  let groupRowCount=0;
  let isFirstInGroup=true;
  // 計算當前分頁中每個組的總記錄數
  const groupCounts={};
  pageData.forEach(r=>{
    const gk=getGroupKey(r["MKT Name"]||"");
    groupCounts[gk]=(groupCounts[gk]||0)+1;
  });

  pageData.forEach((r,i)=>{
    const gk=getGroupKey(r["MKT Name"]||"");
    if(gk!==currentGroupKey){
      currentGroupKey=gk;
      isFirstInGroup=true;
      groupRowCount=0;
    }
    groupRowCount++;

    // 如果是組的第一筆，先插入分組標題行
    if(isFirstInGroup){
      // 計算該組在全部 filteredData 中的總數
      const totalInGroup=filteredData.filter(x=>getGroupKey(x["MKT Name"]||"")===gk).length;
      const isExpanded=expandedGroups.has(gk);
      const symbol=isExpanded?"−":"+";

      const headerTr=document.createElement("tr");
      headerTr.className="group-header";
      const td=document.createElement("td");
      td.colSpan=COLUMNS.length;
      td.innerHTML='<span class="group-toggle" onclick="toggleGroup(\''+escAttr(gk).replace(/'/g,"\\'")+'\')">'+symbol+'</span>'
        +escHtml(gk)
        +'<span class="group-count">('+totalInGroup+')</span>';
      headerTr.appendChild(td);
      tbody.appendChild(headerTr);
      isFirstInGroup=false;
    }

    // 如果組未展開且不是組內第一筆，則折疊
    const isExpanded=expandedGroups.has(gk);
    const tr=document.createElement("tr");
    if(!isExpanded && groupRowCount>1){
      tr.className="collapsed-row";
    }

    COLUMNS.forEach(col=>{
      const td=document.createElement("td");
      const val=r[col.key]||"";
      if(col.key==="EPEAT spec"){
        let cls="badge-silver";
        if(val.includes("Gold")) cls="badge-gold";
        else if(!val||val==="N/A") cls="badge-na";
        td.innerHTML=val?"<span class=\"badge "+cls+"\">"+escHtml(val)+"</span>":"";
      }else if(col.key==="status"){
        const cls=val==="ok"?"badge-ok":"badge-ongoing";
        td.innerHTML=val?"<span class=\"badge "+cls+"\">"+escHtml(val)+"</span>":"";
      }else if(col.key==="Model Name"||col.key==="MKT Name"){
        td.innerHTML=highlight(val,q);
      }else if(col.key==="ES9.0 PASS SKU"){
        // ES9 按鈕：如果有對應的 ES9 資料就顯示按鈕
        const model = r["Model Name"] || "";
        const es9Rows = ES9_DATA[model] || [];
        if(es9Rows.length > 0){
          td.innerHTML = '<button class="btn-es9" onclick="openEs9Modal(\''+escAttr(model)+'\')">查看 ('+es9Rows.length+')</button>';
        } else {
          td.textContent = val;
        }
      }else{
        td.textContent=val;
      }
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  renderPagination(totalPages);
}

function renderPagination(totalPages){
  const pg=document.getElementById("pagination");
  pg.innerHTML="";
  if(totalPages<=1) return;
  function addBtn(label,page,disabled,active){
    const btn=document.createElement("button");
    btn.className="page-btn"+(active?" active":"");
    btn.innerHTML=label;btn.disabled=disabled;
    btn.onclick=()=>{currentPage=page;render();};
    pg.appendChild(btn);
  }
  addBtn("&laquo;",1,currentPage===1,false);
  addBtn("&lsaquo;",currentPage-1,currentPage===1,false);
  let s=Math.max(1,currentPage-2);
  let e=Math.min(totalPages,s+4);
  if(e-s<4) s=Math.max(1,e-4);
  if(s>1){addBtn("1",1,false,false);if(s>2){const sp=document.createElement("span");sp.className="page-info";sp.textContent="&#8230;";pg.appendChild(sp);}}
  for(let i=s;i<=e;i++) addBtn(String(i),i,false,i===currentPage);
  if(e<totalPages){if(e<totalPages-1){const sp=document.createElement("span");sp.className="page-info";sp.textContent="&#8230;";pg.appendChild(sp);}addBtn(String(totalPages),totalPages,false,false);}
  addBtn("&rsaquo;",currentPage+1,currentPage===totalPages,false);
  addBtn("&raquo;",totalPages,currentPage===totalPages,false);
  const info=document.createElement("span");info.className="page-info";
  info.textContent="第 "+currentPage+" / "+totalPages+" 頁";pg.appendChild(info);
}

// ── ES9 彈窗 ──
function openEs9Modal(model){
  const rows = ES9_DATA[model] || [];
  if(rows.length === 0) return;

  document.getElementById('es9ModalTitle').textContent = 'ES9.0 PASS SKU - Model: ' + model + ' (' + rows.length + ' 筆)';

  // 建立表頭
  const thead = document.getElementById('es9ModalHeader');
  thead.innerHTML = '';
  ES9_COLUMNS.forEach(col => {
    const th = document.createElement('th');
    th.textContent = col;
    thead.appendChild(th);
  });

  // 建立內容
  const tbody = document.getElementById('es9ModalBody');
  tbody.innerHTML = '';
  rows.forEach(row => {
    const tr = document.createElement('tr');
    ES9_COLUMNS.forEach(col => {
      const td = document.createElement('td');
      td.textContent = row[col] || '';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  document.getElementById('es9Modal').classList.add('show');
}

function closeEs9Modal(event){
  // 如果點擊的是 overlay 本身（不是 modal-box 內部），或是直接呼叫
  if(!event || event.target === document.getElementById('es9Modal')){
    document.getElementById('es9Modal').classList.remove('show');
  }
}
// ESC 關閉彈窗
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape'){
    document.getElementById('es9Modal').classList.remove('show');
  }
});

// ── 重設 ──
function resetFilters(){
  document.getElementById("searchInput").value="";
  document.querySelectorAll('.ms-dd input[type=checkbox]').forEach(c=>c.checked=false);

  // 預設：年份 = 2025, 2026
  document.querySelectorAll('#yearDd input[type=checkbox]').forEach(cb=>{
    if(cb.value==='2025'||cb.value==='2026') cb.checked=true;
  });
  // 預設：EPEAT 規格 = 除了 N/A、(空白) 以外全部
  document.querySelectorAll('#specDd input[type=checkbox]').forEach(cb=>{
    if(cb.value && cb.value!=='N/A' && cb.value!=='(空白)') cb.checked=true;
  });

  // 更新按鈕文字
  msChange('spec');
  msChange('status');
  msChange('year');

  sortCol="";sortAsc=true;
  document.querySelectorAll(".sort-arrow").forEach(el=>el.innerHTML="&#8645;");
  applyFilters();
}

// ── 匯出 Excel（使用 SheetJS 生成真正的 .xlsx）──
function exportExcel(){
  const headers=ALL_COLUMNS.map(col=>col.label);
  const rows=filteredData.map(r=>ALL_COLUMNS.map(col=>r[col.key]||""));
  const wsData=[headers].concat(rows);
  const ws=XLSX.utils.aoa_to_sheet(wsData);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"EPEAT");
  const dateStr=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,'EPEAT_Export_'+dateStr+'.xlsx');
}

// ── 初始化 ──
buildMsDropdown('spec');
buildMsDropdown('status');
buildMsDropdown('year');

// 設定預設篩選條件
document.querySelectorAll('#yearDd input[type=checkbox]').forEach(cb=>{
  if(cb.value==='2025'||cb.value==='2026') cb.checked=true;
});
document.querySelectorAll('#specDd input[type=checkbox]').forEach(cb=>{
  if(cb.value && cb.value!=='N/A' && cb.value!=='(空白)') cb.checked=true;
});

// 更新按鈕顯示
msChange('spec');
msChange('status');
msChange('year');

applyFilters();
</script>
