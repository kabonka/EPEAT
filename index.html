<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB EPEAT 总表查询系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        
        .search-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .search-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .search-group {
            flex: 1;
            min-width: 200px;
        }
        
        .search-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
            font-size: 0.9em;
        }
        
        .search-group input,
        .search-group select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }
        
        .search-group input:focus,
        .search-group select:focus {
            outline: none;
            border-color: #2a5298;
        }
        
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #2a5298;
            color: white;
        }
        
        .btn-primary:hover {
            background: #1e3c72;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .stats-panel {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            min-width: 150px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            color: #2a5298;
        }
        
        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .results-panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .results-header h2 {
            color: #333;
        }
        
        .table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        thead th {
            background: #1e3c72;
            color: white;
            padding: 12px 10px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 0.9em;
            white-space: nowrap;
        }
        
        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }
        
        tbody tr:hover {
            background: #f5f7ff;
        }
        
        tbody td {
            padding: 10px;
            font-size: 0.9em;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .highlight {
            background: #fff3cd !important;
        }
        
        /* EPEAT规格颜色 */
        .spec-gold {
            background: #fff9c4 !important;
            font-weight: 600;
        }
        .spec-silver {
            background: #e0e0e0 !important;
        }
        .spec-na {
            background: #e0e0e0 !important;
        }
        
        /* SKU弹窗按钮 */
        .sku-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #1976d2;
            cursor: pointer;
            padding: 3px 10px;
            border: 1px solid #1976d2;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.2s;
            user-select: none;
            background: white;
        }
        .sku-btn:hover {
            background: #1976d2;
            color: white;
        }

        /* 弹窗遮罩 */
        .sku-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            justify-content: center;
            align-items: flex-start;
            padding-top: 60px;
            padding-bottom: 40px;
        }
        .sku-modal-overlay.active {
            display: flex;
        }

        /* 弹窗主体 */
        .sku-modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: skuModalIn 0.25s ease;
        }
        @keyframes skuModalIn {
            from { opacity: 0; transform: translateY(-30px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .sku-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 16px;
            border-bottom: 2px solid #1e3c72;
            flex-shrink: 0;
        }
        .sku-modal-header h3 {
            color: #1e3c72;
            font-size: 1.2em;
        }
        .sku-modal-close {
            width: 32px; height: 32px;
            border: none;
            background: #f0f0f0;
            border-radius: 50%;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            transition: all 0.2s;
        }
        .sku-modal-close:hover {
            background: #e53935;
            color: white;
        }

        .sku-modal-body {
            padding: 16px 24px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .sku-modal-body .sku-inner-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88em;
        }
        .sku-modal-body .sku-inner-table th {
            background: #2a5298;
            color: white;
            padding: 8px 10px;
            text-align: left;
            white-space: nowrap;
            font-weight: 500;
            position: sticky;
            top: 0;
        }
        .sku-modal-body .sku-inner-table td {
            padding: 6px 10px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
            color: #333;
        }
        .sku-modal-body .sku-inner-table tr:hover td {
            background: #f0f4ff;
        }
        .sku-touch-y { color: #28a745 !important; font-weight: 600; }
        .sku-touch-n { color: #666 !important; }
        .sku-no-data {
            color: #999;
            font-size: 0.95em;
            text-align: center;
            padding: 30px;
        }
        
        /* EPEAT规格UPC悬浮提示 */
        .spec-upc-tip {
            cursor: pointer;
            color: #2e7d32;
            font-weight: 600;
        }
        #upcTooltipBox {
            display: none;
            position: fixed;
            background: #333;
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.82em;
            font-weight: 400;
            line-height: 1.7;
            white-space: pre-line;
            word-break: break-all;
            min-width: 140px;
            max-width: 360px;
            text-align: center;
            z-index: 9999;
            box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            pointer-events: none;
        }
        #upcTooltipBox::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: #333;
        }

        /* 年份颜色 */
        .year-2023 { border-left: 4px solid #999 !important; }
        .year-2024 { border-left: 4px solid #64b5f6 !important; }
        .year-2025 { border-left: 4px solid #81c784 !important; }
        .year-2026 { border-left: 4px solid #ffb74d !important; }
        
        .no-results {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #2a5298;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }
            .search-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NB EPEAT 总表查询系统</h1>
            <p>NPI 产品进度追踪与查询</p>
        </header>
        
        <div class="stats-panel">
            <div class="stat-card">
                <div class="number" id="modelCount">-</div>
                <div class="label">型号数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="mktCount">-</div>
                <div class="label">市场名称数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="goldCount">-</div>
                <div class="label">金牌数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="silverCount">-</div>
                <div class="label">银牌数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="offlineCount">-</div>
                <div class="label">EPEAT下架数量</div>
            </div>
            <div class="stat-card">
                <div class="number" id="pendingCount">-</div>
                <div class="label">待取证数量</div>
            </div>
        </div>
        
        <div class="search-panel">
            <div class="search-row">
                <div class="search-group">
                    <label>型号</label>
                    <input type="text" id="searchModel" placeholder="输入型号搜索...">
                </div>
                <div class="search-group">
                    <label>市场名称</label>
                    <input type="text" id="searchMkt" placeholder="输入市场名称搜索...">
                </div>
                <div class="search-group">
                    <label>EPEAT规格</label>
                    <select id="searchSpec">
                        <option value="">全部</option>
                        <option value="Gold">Gold</option>
                        <option value="Silver">Silver</option>
                        <option value="Silver_offline">Silver(2025/10/27 EPEAT下架)</option>
                        <option value="NA">NA</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>负责人</label>
                    <select id="searchOwner">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>
            <div class="search-row">
                <div class="search-group">
                    <label>CPU</label>
                    <input type="text" id="searchCpu" placeholder="输入CPU搜索...">
                </div>
                <div class="search-group">
                    <label>年份</label>
                    <select id="searchYear">
                        <option value="">全部</option>
                        <option value="2023">2023</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
                <div class="search-group">
                    <label>MP日期范围</label>
                    <input type="date" id="searchMpFrom" placeholder="从">
                </div>
                <div class="search-group">
                    <label>至</label>
                    <input type="date" id="searchMpTo" placeholder="至">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="applyFilters()">查询</button>
                <button class="btn btn-secondary" onclick="resetFilters()">重置</button>
                <label style="display:flex;align-items:center;gap:6px;font-size:0.95em;color:#555;cursor:pointer;user-select:none;">
                    <input type="checkbox" id="showNA" onchange="applyFilters()" style="width:16px;height:16px;cursor:pointer;">
                    显示NA规格
                </label>
            </div>
        </div>
        
        <div class="results-panel">
            <div class="results-header">
                <h2>查询结果</h2>
                <span id="resultCount">-</span>
            </div>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>型号</th>
                            <th>市场名称</th>
                            <th>EPEAT规格</th>
                            <th>负责人</th>
                            <th>实际取证日期</th>
                            <th>CPU</th>
                            <th>GPU</th>
                            <th>MP日期</th>
                            <th>年份</th>
                            <th>预计取证日期</th>
                            <th>ES9.0 PASS SKU</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="11" class="loading">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- UPC悬浮提示 -->
    <div id="upcTooltipBox"></div>

    <!-- SKU弹窗 -->
    <div class="sku-modal-overlay" id="skuModalOverlay" onclick="if(event.target===this)closeSkuModal()">
        <div class="sku-modal">
            <div class="sku-modal-header">
                <h3 id="skuModalTitle">ES9.0 PASS SKU</h3>
                <button class="sku-modal-close" onclick="closeSkuModal()">&times;</button>
            </div>
            <div class="sku-modal-body" id="skuModalBody">
                <span class="sku-no-data">加载中...</span>
            </div>
        </div>
    </div>
    
    <script src="epeat_data.js"></script>
    <script>
        let allData = epeatData;
        
        // 初始化
        function init() {
            initFilters();
            // 默认隐藏含NA字样的行
            renderTable(allData.filter(item => !String(item['EPEAT规格'] || '').includes('NA')));
            updateStats();
        }
        
        // 初始化筛选器选项
        function initFilters() {
            const owners = [...new Set(allData.map(d => d['负责人']).filter(Boolean))];
            const ownerSelect = document.getElementById('searchOwner');
            owners.forEach(owner => {
                const option = document.createElement('option');
                option.value = owner;
                option.textContent = owner;
                ownerSelect.appendChild(option);
            });
        }
        
        // 应用筛选
        function applyFilters() {
            const model = document.getElementById('searchModel').value.toLowerCase();
            const mkt = document.getElementById('searchMkt').value.toLowerCase();
            const cpu = document.getElementById('searchCpu').value.toLowerCase();
            const owner = document.getElementById('searchOwner').value;
            const year = document.getElementById('searchYear').value;
            const spec = document.getElementById('searchSpec').value;
            const mpFrom = document.getElementById('searchMpFrom').value;
            const mpTo = document.getElementById('searchMpTo').value;
            const showNA = document.getElementById('showNA').checked;
            
            const filtered = allData.filter(item => {
                // 默认隐藏含NA字样的行，勾选"显示NA规格"后才显示
                if (!showNA && String(item['EPEAT规格'] || '').includes('NA')) return false;
                if (model && !item['型号'].toLowerCase().includes(model)) return false;
                if (mkt && !item['市场名称'].toLowerCase().includes(mkt)) return false;
                if (cpu && !item['CPU'].toLowerCase().includes(cpu)) return false;
                if (owner && item['负责人'] !== owner) return false;
                if (year && String(item['年份']) !== year) return false;
                if (spec) {
                    const specValue = item['EPEAT规格'] || '';
                    if (spec === 'Gold' && !specValue.toLowerCase().includes('gold') && !specValue.includes('金牌')) return false;
                    if (spec === 'Silver' && specValue.toLowerCase() !== 'silver') return false;
                    if (spec === 'Silver_offline' && !specValue.includes('Silver(2025/10/27 EPEAT下架)')) return false;
                    if (spec === 'NA' && !specValue.includes('NA')) return false;
                }
                if (mpFrom && item['MP日期'] < mpFrom) return false;
                if (mpTo && item['MP日期'] > mpTo) return false;
                return true;
            });
            
            renderTable(filtered);
        }
        
        // 重置筛选
        function resetFilters() {
            document.querySelectorAll('input, select').forEach(el => {
                if (el.type === 'checkbox') el.checked = false;
                else if (el.type === 'date') el.value = '';
                else if (el.tagName === 'SELECT') el.selectedIndex = 0;
                else el.value = '';
            });
            renderTable(allData.filter(item => !String(item['EPEAT规格'] || '').includes('NA')));
        }
        
        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            document.getElementById('resultCount').textContent = `共 ${data.length} 条记录`;
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="no-results">没有找到匹配的记录</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map(item => {
                const yearClass = `year-${item['年份'] || 'other'}`;
                const specClass = getSpecClass(item['EPEAT规格']);
                
                // 格式化日期函数 - 只保留日期部分，去除时间
                const formatDate = (dateStr) => {
                    if (!dateStr) return '-';
                    // 如果包含时间（空格+T），只取日期部分
                    const datePart = String(dateStr).split(/[\s+T]/)[0];
                    return datePart || '-';
                };
                
                const specValue = item['EPEAT规格'] || '';
                const upcValue = item['EPEAT 登記UPC'] || '';
                const safeModel = item['型号'].replace(/'/g, "\\'");
                let specTd;
                if (String(specValue).includes('UPC') && upcValue) {
                    specTd = `<td class="${specClass}"><span class="spec-upc-tip" onmouseenter="showUpcTip(event, '${safeModel}')" onmouseleave="hideUpcTip()">${specValue}</span></td>`;
                } else {
                    specTd = `<td class="${specClass}">${specValue}</td>`;
                }
                
                return `<tr class="${yearClass}">
                    <td><strong>${item['型号']}</strong></td>
                    <td title="${item['市场名称']}">${item['市场名称']}</td>
                    ${specTd}
                    <td>${item['负责人']}</td>
                    <td>${formatDate(item['实际取证日期']) || '-'}</td>
                    <td>${item['CPU']}</td>
                    <td>${item['GPU']}</td>
                    <td>${formatDate(item['MP日期'])}</td>
                    <td><strong>${item['年份']}</strong></td>
                    <td>${formatDate(item['预计取证日期'])}</td>
                    <td>${hasSkuData(item['型号']) ? `<span class="sku-btn" onclick="openSkuModal('${safeModel}')">SKU详情</span>` : ''}</td>
                </tr>`;
            }).join('');
        }
        
        // EPEAT规格样式
        function getSpecClass(spec) {
            if (spec.includes('金牌') || spec.includes('Gold')) return 'spec-gold';
            if (spec.includes('銀牌') || spec.includes('Silver')) return 'spec-silver';
            if (spec.includes('NA') || spec.includes('下架')) return 'spec-na';
            return '';
        }
        
        // UPC悬浮提示 - fixed定位避免被表格overflow裁剪
        function showUpcTip(event, model) {
            const item = allData.find(d => d['型号'] === model);
            if (!item) return;
            const tip = document.getElementById('upcTooltipBox');
            tip.textContent = 'EPEAT登记UPC：' + (item['EPEAT 登記UPC'] || '').replace(/[,，]/g, '\n');
            tip.style.display = 'block';
            const rect = event.target.getBoundingClientRect();
            const tipRect = tip.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - tipRect.width / 2;
            let top = rect.top - tipRect.height - 10;
            if (left < 8) left = 8;
            if (left + tipRect.width > window.innerWidth - 8) left = window.innerWidth - tipRect.width - 8;
            if (top < 8) top = rect.bottom + 10;
            tip.style.left = left + 'px';
            tip.style.top = top + 'px';
        }
        function hideUpcTip() {
            document.getElementById('upcTooltipBox').style.display = 'none';
        }

        // ========== ES9.0 PASS SKU 弹窗逻辑 ==========
        // 内嵌整合版SKU数据

        // 判断型号是否有SKU数据
        function hasSkuData(model) {
            return findSkuRowsForModel(model).length > 0;
        }

        // 根据型号查找匹配的SKU行
        function findSkuRowsForModel(model) {
            if (!model || !skuConsolidatedData) return [];
            const rows = skuConsolidatedData['ES9.0 PASS SKU'].rows;
            const modelUpper = model.toUpperCase();

            // 精确匹配 Project 列
            let matched = rows.filter(r => {
                const p = String(r[0] || '').toUpperCase();
                return p === modelUpper || p === modelUpper.replace(/^MS-/, '');
            });

            // 精确匹配失败，尝试包含匹配
            if (matched.length === 0) {
                matched = rows.filter(r => {
                    const p = String(r[0] || '').toUpperCase();
                    return p && (modelUpper.includes(p) || p.includes(modelUpper.replace(/^MS-/, '')));
                });
            }
            return matched;
        }

        // 构建弹窗内的表格HTML
        function buildSkuModalHtml(rows) {
            if (rows.length === 0) {
                return '<span class="sku-no-data">暂无 ES9.0 PASS SKU 数据</span>';
            }
            const cols = skuConsolidatedData['ES9.0 PASS SKU'].columns;
            const headerHtml = cols.map(c => `<th>${c}</th>`).join('');
            const bodyHtml = rows.map(row => {
                const tds = row.map((cell, ci) => {
                    const val = String(cell || '');
                    let cls = '';
                    if (ci === 4) { // Touch 列
                        if (val.toUpperCase() === 'Y') cls = 'sku-touch-y';
                        else if (val.toUpperCase() === 'N') cls = 'sku-touch-n';
                    }
                    return `<td class="${cls}" title="${val}">${val || '-'}</td>`;
                }).join('');
                return `<tr>${tds}</tr>`;
            }).join('');
            return `<table class="sku-inner-table"><thead><tr>${headerHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`;
        }

        // 打开弹窗
        function openSkuModal(model) {
            const overlay = document.getElementById('skuModalOverlay');
            const title = document.getElementById('skuModalTitle');
            const body = document.getElementById('skuModalBody');
            title.textContent = `ES9.0 PASS SKU - ${model}`;
            body.innerHTML = '<span class="sku-no-data">加载中...</span>';
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';

            const rows = findSkuRowsForModel(model);
            body.innerHTML = buildSkuModalHtml(rows);
        }

        // 关闭弹窗
        function closeSkuModal() {
            document.getElementById('skuModalOverlay').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ESC关闭弹窗
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closeSkuModal();
        });
        
        // 更新统计
        function updateStats() {
            // 型号数量（唯一值）
            const modelCount = [...new Set(allData.map(d => d['型号']).filter(Boolean))].length;
            document.getElementById('modelCount').textContent = modelCount;
            
            // 市场名称数量（唯一值）
            const mktCount = [...new Set(allData.map(d => d['市场名称']).filter(Boolean))].length;
            document.getElementById('mktCount').textContent = mktCount;
            
            // 金牌数量（J栏含Gold/金牌）
            const goldCount = allData.filter(d => {
                const spec = String(d['EPEAT规格'] || '').toLowerCase();
                return spec.includes('gold') || spec.includes('金牌');
            }).length;
            document.getElementById('goldCount').textContent = goldCount;
            
            // 银牌数量（J栏等于Silver）
            const silverCount = allData.filter(d => {
                const spec = String(d['EPEAT规格'] || '').toLowerCase();
                return spec === 'silver';
            }).length;
            document.getElementById('silverCount').textContent = silverCount;
            
            // EPEAT下架数量（Silver(2025/10/27 EPEAT下架)）
            const offlineCount = allData.filter(d => {
                const spec = String(d['EPEAT规格'] || '');
                return spec.includes('Silver(2025/10/27 EPEAT下架)');
            }).length;
            document.getElementById('offlineCount').textContent = offlineCount;
            
            // 待取证数量（金牌+银牌中，I栏为空白）
            const pendingCount = allData.filter(d => {
                const spec = String(d['EPEAT规格'] || '').toLowerCase();
                const isGoldOrSilver = (spec.includes('gold') || spec.includes('金牌') || spec === 'silver');
                const noCertDate = !d['实际取证日期'];
                return isGoldOrSilver && noCertDate;
            }).length;
            document.getElementById('pendingCount').textContent = pendingCount;
        }
        
        // 监听输入事件进行实时搜索
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', debounce(applyFilters, 300));
        });
        
        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        
        // 页面加载时初始化
        init();
    </script>
